<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIDL Editor — Demo Harness</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #0b1623;
      color: #c8d8e8;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }
    #editor {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    /* Pass-through: let the editor bundle own all inner layout */
  </style>
</head>
<body>
  <div id="editor"></div>
  <script src="./midl-editor.global.js"></script>
  <script src="./harness.js"></script>
</body>
</html>
