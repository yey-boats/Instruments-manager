services:
  signalk:
    image: signalk/signalk-server:latest
    container_name: signalk-server
    ports:
      - "3000:3000"
      - "10110:10110"
      - "34300:34300/udp"
      - "34301:34301/udp"
    volumes:
      - ./config:/home/node/.signalk
      - ../:/home/node/plugins/yey-boats-display-manager

  simulator:
    image: ghcr.io/yey-boats/simulator:latest
    container_name: boat-sim
    depends_on:
      - signalk
    environment:
      SIGNALK_HOST: signalk
      SIGNALK_PORT: "3000"
      SIGNALK_USERNAME: admin
      SIGNALK_PASSWORD: admin
      SIM_WEB_HOST: 0.0.0.0
      SIM_WEB_PORT: "8088"
    ports:
      - "8088:8088"   # web admin UI (app default 8080 is often taken on lab hosts)
    volumes:
      - sim-data:/data
    restart: unless-stopped

volumes:
  sim-data:
