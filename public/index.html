<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YEY Boats Display Manager</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f1720;
    }
    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: white;
    }
    a.instruments-link {
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 10;
      padding: 8px 14px;
      border-radius: 999px;
      background: #141b22;
      color: #6ee7a8;
      border: 1px solid #1d4d36;
      font: 600 13px/1 system-ui, -apple-system, sans-serif;
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(0,0,0,.4);
    }
    a.instruments-link:hover { background: #0e1a14; }
  </style>
</head>
<body>
  <iframe title="YEY Boats Display Manager" src="/plugins/yey-boats-display-manager/ui"></iframe>
  <a class="instruments-link" href="./instruments.html">MIDL Instruments demo →</a>

</html>
